name: PF-300 인스타 지표 수집

on:
  schedule:
    # 매일 23:30 UTC = 한국시간 08:30 — 리포트(09:00 KST) 직전에 최신 지표 확보
    - cron: "30 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ig-insights
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 지표 수집
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python insights.py

      - name: insights.json 커밋
        run: |
          git config user.name "pf300-bot"
          git config user.email "bot@users.noreply.github.com"
          git add insights.json
          git commit -m "chore: update insights.json [skip ci]" || echo "변경 없음"
          git push
