name: 진단 (계정·게시물 확인)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 진단 실행
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python check.py
      - name: 결과 저장(diag.json)
        run: |
          git config user.name "pf300-bot"
          git config user.email "bot@users.noreply.github.com"
          git add diag.json
          git commit -m "chore: diag [skip ci]" || echo "변경 없음"
          git push
